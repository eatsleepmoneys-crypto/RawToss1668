<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TigerLotto — Agent Portal</title>
<link rel="icon" id="favicon-link" type="image/svg+xml" href="/api/favicon">
<link rel="shortcut icon" href="/api/favicon">
<style>
  :root{
    --bg:#0a0a0a;--card:#111;--card2:#1a1a1a;--border:rgba(255,255,255,.08);
    --gold:#d4a017;--gold2:#ffd700;--text:#f0f0f0;--muted:#888;
    --green:#2ed573;--red:#ff4757;--blue:#1e90ff;
    --grad:linear-gradient(135deg,#d4a017,#ffd700,#b8860b);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}

  /* ── Login ── */
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:420px}
  .login-logo{text-align:center;margin-bottom:28px}
  .login-logo .tiger{font-size:48px}
  .login-logo h1{font-size:22px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:8px}
  .login-logo p{font-size:12px;color:var(--muted);margin-top:4px}
  .fg{margin-bottom:16px}
  .fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .fi{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:15px;outline:none;transition:.2s}
  .fi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,160,23,.15)}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
  .btn-gold{background:var(--grad);color:#000}
  .btn-gold:hover{opacity:.9;transform:translateY(-1px)}
  .btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:20px}

  /* ── Dashboard layout ── */
  .app{display:none;flex-direction:column;min-height:100vh}
  .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .topbar-logo{font-size:20px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .topbar-badge{background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.3);color:var(--gold);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .agent-name{font-size:14px;font-weight:600}
  .btn-sm{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:.2s}
  .btn-sm:hover{background:var(--card2);color:var(--text)}

  /* ── Nav tabs ── */
  .nav-tabs{display:flex;gap:4px;background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
  .nav-tab{padding:14px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
  .nav-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
  .nav-tab:hover:not(.on){color:var(--text)}

  /* ── Content ── */
  .content{padding:24px 20px;max-width:1100px;margin:0 auto;width:100%}

  /* ── Cards ── */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
  .stat-label{font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .stat-val{font-size:26px;font-weight:900}
  .stat-val.gold{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .stat-val.green{color:var(--green)}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

  /* ── Table ── */
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px}
  .card h3{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--gold)}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:10px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border)}
  td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-green{background:rgba(46,213,115,.12);color:var(--green);border:1px solid rgba(46,213,115,.3)}
  .badge-red{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.3)}

  /* ── Search / filter bar ── */
  .filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .fi-sm{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
  .fi-sm:focus{border-color:var(--gold)}

  /* ── Commission chart ── */
  .chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .chart-date{width:90px;font-size:11px;color:var(--muted);flex-shrink:0}
  .chart-bar-bg{flex:1;height:20px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
  .chart-bar-fill{height:100%;background:var(--grad);border-radius:4px;transition:.4s}
  .chart-val{width:80px;font-size:12px;color:var(--gold2);text-align:right;flex-shrink:0}

  /* ── Pagination ── */
  .paging{display:flex;gap:6px;justify-content:center;margin-top:16px}
  .page-btn{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:.2s}
  .page-btn.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
  .page-btn:hover:not(.on){background:var(--card2)}

  /* ── Profile ── */
  .profile-row{display:flex;align-items:center;gap:16px;margin-bottom:20px}
  .profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
  .profile-info h2{font-size:20px;font-weight:800}
  .profile-info p{font-size:13px;color:var(--muted);margin-top:2px}

  /* ── Wallet ── */
  .wallet-hero{background:linear-gradient(135deg,#1a1a00,#2d2200);border:1px solid rgba(212,160,23,.4);border-radius:18px;padding:28px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .wallet-bal-label{font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
  .wallet-bal-val{font-size:40px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
  .wallet-actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn-action{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.2s;white-space:nowrap}
  .btn-deposit{background:var(--green);color:#000}
  .btn-deposit:hover{opacity:.85}
  .btn-withdraw{background:transparent;border:1px solid var(--border)!important;color:var(--text)}
  .btn-withdraw:hover{background:var(--card2)}

  /* ── Modal ── */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
  .modal-box h3{font-size:16px;font-weight:800;margin-bottom:20px;color:var(--gold)}
  .modal-close{float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;margin-top:-4px}

  /* ── Lottery cards (index-style) ── */
  .lot-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .lot-ftab{padding:7px 16px;border-radius:30px;font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--border);background:var(--card2);cursor:pointer;transition:.2s;font-family:'Sarabun',sans-serif}
  .lot-ftab.on{background:var(--grad);color:#000;border-color:transparent}
  .lot-group{margin-bottom:28px}
  .lot-group-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .lot-group-hdr h3{font-size:14px;font-weight:700}
  .lot-group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .lot-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:.3s;cursor:pointer}
  .lot-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 8px 28px rgba(212,160,23,.18)}
  .lot-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
  .lot-card.upcoming{opacity:.75;cursor:default}
  .lot-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
  .lot-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;background:rgba(212,160,23,.1);color:var(--gold2);border:1px solid rgba(212,160,23,.3)}
  .lot-tag.hot{background:rgba(255,71,87,.1);color:#ff8a92;border-color:rgba(255,71,87,.3)}
  .lot-tag.vip{background:rgba(61,139,205,.1);color:#7ec8e3;border-color:rgba(61,139,205,.3)}
  .lot-tag.lao{background:rgba(46,213,115,.1);color:#7dffb3;border-color:rgba(46,213,115,.3)}
  .lot-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px}
  .lot-status.open{color:#2ed573;background:rgba(46,213,115,.1)}
  .lot-status.soon{color:#ffa502;background:rgba(255,165,2,.1)}
  .lot-status.closed{color:#ff4757;background:rgba(255,71,87,.1)}
  .lot-name{font-size:15px;font-weight:700;margin-bottom:3px}
  .lot-prize{font-size:20px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
  .lot-meta{font-size:11px;color:var(--muted);margin-bottom:3px}
  .lot-meta span{color:var(--red);font-weight:700}
  .lot-rate{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.8}
  .lot-rate b{color:var(--gold)}
  .lot-btn{width:100%;padding:10px;background:var(--grad);color:#000;border-radius:10px;font-size:13px;font-weight:700;transition:.25s;border:none;font-family:'Sarabun',sans-serif;cursor:pointer}
  .lot-btn:hover{opacity:.88;transform:translateY(-1px)}
  .lot-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  /* ── legacy round-card (keep for compat) ── */
  .rate-chip{background:rgba(255,255,255,.06);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--muted)}
  .rate-chip span{color:var(--gold2);font-weight:700}

  /* ── Bet form ── */
  .bet-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .bet-type-btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:.2s;font-size:12px;font-weight:600;color:var(--muted)}
  .bet-type-btn.sel{border-color:var(--gold);background:rgba(212,160,23,.12);color:var(--gold2)}
  .bet-type-btn:hover:not(.sel){border-color:var(--border);background:rgba(255,255,255,.04)}
  .bet-rate{font-size:18px;font-weight:900;color:var(--gold);margin-top:4px}

  /* ── Cart-based buy modal ── */
  .buy-grp-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}
  .buy-types-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px}
  .buy-type-btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 6px;text-align:center;cursor:pointer;transition:.2s;font-size:12px;font-weight:600;color:var(--muted);line-height:1.4}
  .buy-type-btn.on{border-color:var(--gold);background:rgba(212,160,23,.15);color:var(--gold2)}
  .buy-type-btn:hover:not(.on){background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15)}

  /* ── Tx badges ── */
  .badge-deposit{background:rgba(46,213,115,.12);color:var(--green);border:1px solid rgba(46,213,115,.3)}
  .badge-withdraw{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.3)}
  .badge-bet{background:rgba(30,144,255,.1);color:var(--blue);border:1px solid rgba(30,144,255,.3)}
  .badge-win{background:rgba(212,160,23,.15);color:var(--gold2);border:1px solid rgba(212,160,23,.4)}
  .badge-pending{background:rgba(255,165,0,.1);color:orange;border:1px solid rgba(255,165,0,.3)}
  .badge-wait{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)}
  .badge-lose{background:rgba(255,71,87,.06);color:#ff8e9a;border:1px solid rgba(255,71,87,.2)}

  /* ── Empty / loading ── */
  .empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
  .loading{text-align:center;padding:30px;color:var(--muted)}

  @media(max-width:600px){
    .stat-grid{grid-template-columns:1fr 1fr}
    .content{padding:16px 12px}
    .topbar{padding:0 12px}
    .nav-tabs{padding:0 12px}
    .bet-type-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-wrap" id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="tiger">🐯</div>
      <h1>TigerLotto</h1>
      <p>Agent Portal — เข้าสู่ระบบเอเยนต์</p>
    </div>
    <div class="fg">
      <label>เบอร์โทรศัพท์</label>
      <input class="fi" id="lg-phone" type="tel" placeholder="0812345678" autocomplete="username">
    </div>
    <div class="fg">
      <label>รหัสผ่าน</label>
      <input class="fi" id="lg-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-gold" id="lg-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="err" id="lg-err"></div>
  </div>
</div>

<!-- ── APP ── -->
<div class="app" id="app-page">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🐯 TigerLotto</span>
      <span class="topbar-badge">AGENT</span>
    </div>
    <div class="topbar-right">
      <span class="agent-name" id="agent-name-hdr">—</span>
      <button class="btn-sm" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav-tabs">
    <div class="nav-tab on" data-tab="dashboard"   onclick="switchTab('dashboard',this)">📊 ภาพรวม</div>
    <div class="nav-tab" data-tab="wallet"         onclick="switchTab('wallet',this)">💳 กระเป๋าเงิน</div>
    <div class="nav-tab" data-tab="lottery"        onclick="switchTab('lottery',this)">🎰 ซื้อหวย</div>
    <div class="nav-tab" data-tab="affiliate"      onclick="switchTab('affiliate',this)">🔗 ลิ้งแนะนำ</div>
    <div class="nav-tab" data-tab="members"        onclick="switchTab('members',this)">👥 สมาชิก</div>
    <div class="nav-tab" data-tab="commissions"    onclick="switchTab('commissions',this)">💰 ค่าคอมมิชชั่น</div>
    <div class="nav-tab" data-tab="profile"        onclick="switchTab('profile',this)">👤 ข้อมูลเอเยนต์</div>
  </div>

  <!-- Content -->
  <div class="content" id="tab-content">
    <div class="loading">⏳ กำลังโหลด...</div>
  </div>
</div>

<script>
const API_BASE = '/api';
let _agentToken = localStorage.getItem('agent_token');
let _agentData  = null;
let _membersPage = 1;

// ── API helper ──────────────────────────────────────────────────
async function aFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (_agentToken) headers['Authorization'] = `Bearer ${_agentToken}`;
  const res  = await fetch(`${API_BASE}${path}`, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}

// ── FormData (file upload) helper ─────────────────────────────────
async function aFetchForm(path, formData) {
  const headers = {};
  if (_agentToken) headers['Authorization'] = `Bearer ${_agentToken}`;
  // ไม่ set Content-Type เพื่อให้ browser จัดการ multipart boundary
  const res  = await fetch(`${API_BASE}${path}`, { method: 'POST', headers, body: formData });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}

// ── Login / Logout ──────────────────────────────────────────────
async function doLogin() {
  const phone = document.getElementById('lg-phone').value.trim();
  const pass  = document.getElementById('lg-pass').value;
  const btn   = document.getElementById('lg-btn');
  const err   = document.getElementById('lg-err');
  err.textContent = '';
  if (!phone || !pass) { err.textContent = 'กรุณากรอกข้อมูลให้ครบ'; return; }
  btn.disabled = true; btn.textContent = '⏳ กำลังเข้าสู่ระบบ...';
  try {
    const d = await aFetch('/auth/agent/login', {
      method: 'POST',
      body: JSON.stringify({ phone, password: pass })
    });
    _agentToken = d.token;
    _agentData  = d.agent;
    localStorage.setItem('agent_token', _agentToken);
    showApp();
  } catch(e) {
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
  }
}

function doLogout() {
  localStorage.removeItem('agent_token');
  _agentToken = null; _agentData = null;
  document.getElementById('app-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('lg-pass').value = '';
  document.getElementById('lg-err').textContent = '';
  document.getElementById('lg-btn').disabled = false;
  document.getElementById('lg-btn').textContent = 'เข้าสู่ระบบ';
}

// รองรับกด Enter
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});

// ── App init ──────────────────────────────────────────────────────
async function showApp() {
  try {
    const me = await aFetch('/auth/agent/me');
    _agentData = me.data;
  } catch(_) { doLogout(); return; }

  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-page').style.display   = 'flex';
  document.getElementById('app-page').style.flexDirection = 'column';
  document.getElementById('agent-name-hdr').textContent = _agentData.name;
  switchTab('dashboard', document.querySelector('.nav-tab[data-tab="dashboard"]'));
}

// ── Generic error display ─────────────────────────────────────────
function showTabError(msg, retryFn) {
  const el = document.getElementById('tab-content');
  if (!el) return;
  el.innerHTML = `
    <div style="color:#ff6b81;background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:10px;padding:24px;text-align:center;margin-top:20px">
      <div style="font-size:28px;margin-bottom:8px">⚠️</div>
      <div style="font-weight:600;margin-bottom:4px">โหลดข้อมูลไม่ได้</div>
      <div style="color:#aaa;font-size:13px;margin-bottom:14px">${msg}</div>
      ${retryFn ? `<button onclick="${retryFn}()" style="padding:8px 20px;background:#d4a017;color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer">🔄 ลองใหม่</button>` : ''}
    </div>`;
}

// ── Tab switching ─────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('on'));
  if (el) el.classList.add('on');
  _membersPage = 1;
  const content = document.getElementById('tab-content');
  content.innerHTML = '<div class="loading">⏳ กำลังโหลด...</div>';
  const fns = { dashboard:loadDashboard, wallet:loadWallet, lottery:loadLottery,
                affiliate:loadAffiliate, members:loadMembers, commissions:loadCommissions, profile:loadProfile };
  const fn = fns[tab];
  if (fn) fn().catch(e => showTabError(e.message, tab+'Tab'));
}

// ── Affiliate ─────────────────────────────────────────────────────

function copyAffLink(link) {
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = '✅ คัดลอกแล้ว!'; setTimeout(() => { btn.textContent = '📋 คัดลอก'; }, 2000); }
    const msg = document.getElementById('aff-msg');
    if (msg) { msg.style.color='var(--green)'; msg.textContent='✅ คัดลอกลิ้งไปยัง Clipboard แล้ว'; setTimeout(()=>{ msg.textContent=''; },3000); }
  }).catch(() => {
    // fallback
    const inp = document.getElementById('aff-link-input');
    if (inp) { inp.select(); document.execCommand('copy'); }
  });
}

async function regenAffLink() {
  if (!confirm('สร้างลิ้งใหม่? ลิ้งเดิมจะใช้งานไม่ได้อีกต่อไป')) return;
  try {
    await aFetch('/agent/affiliate/regen', { method: 'POST' });
    loadAffiliate();
  } catch(e) {
    alert('เกิดข้อผิดพลาด: ' + e.message);
  }
}

      <div class="fg"><label>รหัสผ่านใหม่</label><input class="fi" id="pw-new" type="password" placeholder="อย่างน้อย 8 ตัว"></div>
      <div class="fg"><label>ยืนยันรหัสผ่านใหม่</label><input class="fi" id="pw-con" type="password" placeholder="••••••••"></div>
      <button class="btn btn-gold" style="max-width:200px" id="pw-btn" onclick="changePassword()">บันทึกรหัสผ่าน</button>
      <div class="err" id="pw-err"></div>
    </div>`;

  // pre-select bank if already set
  if (a.bank_code) {
    const sel = document.getElementById('prof-bank-code');
    if (sel) sel.value = a.bank_code;
  }
}

async function saveAgentBank() {
  const bank_code    = document.getElementById('prof-bank-code')?.value;
  const bank_account = document.getElementById('prof-bank-acc')?.value?.trim();
  const bank_name    = document.getElementById('prof-bank-name')?.value?.trim();
  const err          = document.getElementById('bank-err');
  const btn          = document.getElementById('bank-btn');
  err.textContent = '';
  if (!bank_code)    { err.textContent = 'กรุณาเลือกธนาคาร'; return; }
  if (!bank_account) { err.textContent = 'กรุณากรอกเลขบัญชี'; return; }
  if (!bank_name)    { err.textContent = 'กรุณากรอกชื่อบัญชี'; return; }
  btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
  try {
    await aFetch('/agent/bank', { method: 'PATCH', body: JSON.stringify({ bank_code, bank_account, bank_name }) });
    // อัพเดท _agentData ในหน่วยความจำ
    _agentData.bank_code    = bank_code;
    _agentData.bank_account = bank_account;
    _agentData.bank_name    = bank_name;
    err.style.color = '#5cdb5c';
    err.textContent = '✅ บันทึกบัญชีธนาคารสำเร็จ';
    // reload หน้า profile เพื่อแสดงข้อมูลใหม่
    setTimeout(() => loadProfile(), 800);
  } catch(e) {
    err.style.color = '#e74c3c';
    err.textContent = e.message || 'เกิดข้อผิดพลาด';
  } finally {
    btn.disabled = false; btn.textContent = '💾 บันทึกบัญชีธนาคาร';
  }
}

async function changePassword() {
  const oldPw = document.getElementById('pw-old')?.value;
  const newPw = document.getElementById('pw-new')?.value;
  const conPw = document.getElementById('pw-con')?.value;
  const err   = document.getElementById('pw-err');
  const btn   = document.getElementById('pw-btn');
  err.textContent = '';
  if (!oldPw || !newPw || !conPw) { err.textContent = 'กรุณากรอกข้อมูลให้ครบ'; return; }
  if (newPw.length < 8)           { err.textContent = 'รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัว'; return; }
  if (newPw !== conPw)            { err.textContent = 'รหัสผ่านใหม่ไม่ตรงกัน'; return; }
  btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
  try {
    await aFetch('/agent/change-password', {
      method: 'POST',
      body: JSON.stringify({ old_password: oldPw, new_password: newPw })
    });
    err.style.color = 'var(--green)';
    err.textContent = '✅ เปลี่ยนรหัสผ่านสำเร็จ';
    document.getElementById('pw-old').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-con').value = '';
  } catch(e) {
    err.style.color = 'var(--red)';
    err.textContent = e.message;
  }
  btn.disabled = false; btn.textContent = 'บันทึกรหัสผ่าน';
}

async function submitDeposit() {
  const amount  = document.getElementById('dep-amount')?.value;
  const slipEl  = document.getElementById('dep-slip');
  const note    = document.getElementById('dep-note')?.value;
  const err     = document.getElementById('dep-err');
  const btn     = document.getElementById('dep-submit-btn');
  err.textContent = '';
  if (!amount || Number(amount) < 100) { err.textContent = 'กรุณากรอกจำนวนเงินขั้นต่ำ 100 บาท'; return; }
  if (!slipEl?.files[0]) { err.textContent = 'กรุณาแนบสลิปโอนเงิน'; return; }
  btn.disabled = true; btn.textContent = '⏳ กำลังส่ง...';
  try {
    const fd = new FormData();
    fd.append('amount',   Number(amount));
    fd.append('slip',     slipEl.files[0]);
    if (note) fd.append('note', note);
    await aFetchForm('/agent/wallet/deposit', fd);
    document.getElementById('dep-modal')?.remove();
    loadWallet('deposits');
    // แสดง toast ถ้ามี
    const toastFn = window.showToast || window.toast;
    if (toastFn) toastFn('ส่งสลิปสำเร็จ ✅', 'Admin จะอนุมัติภายใน 10 นาที');
    else alert('ส่งสลิปสำเร็จ — Admin จะอนุมัติภายใน 10 นาที');
  } catch(e) {
    err.style.color = 'var(--red)';
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = '📤 ส่งสลิปฝากเงิน — รอ Admin อนุมัติ';
  }
}

async function submitWithdraw() {
  const amount       = document.getElementById('wd-amount')?.value;
  const bank_code    = document.getElementById('wd-bank')?.value;
  const bank_account = document.getElementById('wd-acc')?.value;
  const bank_name    = document.getElementById('wd-name')?.value;
  const note         = document.getElementById('wd-note')?.value;
  const err          = document.getElementById('wd-err');
  const btn          = document.getElementById('wd-submit-btn');
  err.textContent = '';
  if (!amount || Number(amount) < 100)      { err.textContent = 'กรุณากรอกจำนวนเงินขั้นต่ำ 100 บาท'; return; }
  if (!bank_code)                            { err.textContent = 'กรุณาเลือกธนาคาร'; return; }
  if (!bank_account)                         { err.textContent = 'กรุณากรอกเลขบัญชี'; return; }
  if (!bank_name)                            { err.textContent = 'กรุณากรอกชื่อบัญชี'; return; }
  if (Number(amount) > (_agentData?.balance||0)) { err.textContent = 'ยอดเงินไม่เพียงพอ'; return; }
  btn.disabled = true; btn.textContent = '⏳ กำลังส่ง...';
  try {
    await aFetch('/agent/wallet/withdraw', { method:'POST', body: JSON.stringify({ amount:Number(amount), bank_code, bank_account, bank_name, note }) });
    document.getElementById('wd-modal')?.remove();
    loadWallet('withdrawals');
  } catch(e) {
    err.style.color = 'var(--red)';
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = '✅ ยืนยันถอนเงิน';
  }
}

function _agentTagFor(code){

function _agentStatusFor(r){
  if(r.status === 'upcoming'){
    if(r.open_at){
      const diff = new Date(r.open_at).getTime() - Date.now();
      if(diff > 0){
        const hh = Math.floor(diff/3600000), mm = Math.floor((diff%3600000)/60000);
        return `<span class="lot-status soon">🕐 เปิดใน ${hh>0?hh+'ช ':'' }${mm}น.</span>`;
      }
    }
    return '<span class="lot-status soon">🕐 เปิดรับเร็วๆ นี้</span>';
  }
  const diff = new Date(r.close_at).getTime() - Date.now();
  if(diff < 0)             return '<span class="lot-status closed">🔴 ปิดรับแล้ว</span>';
  if(diff < 30*60*1000)    return `<span class="lot-status soon">🟡 ใกล้ปิด ${Math.ceil(diff/60000)}น.</span>`;

function _renderAgentLotGroups(filterCode){
  const el = document.getElementById('agent-lot-groups');
  if(!el) return;
  let rounds = _allAgentRounds;
  if(filterCode !== 'ALL'){
    if(filterCode === 'VN_HANOI') rounds = rounds.filter(r => VN_CODES.has(r.code));
    else rounds = rounds.filter(r => r.code === filterCode);
  }
  if(rounds.length === 0){
    el.innerHTML = '<div class="empty">ไม่มีงวดในประเภทนี้</div>';
    return;
  }
  // Group by code
  const groups = {};
  rounds.forEach(r => {
    const key = VN_CODES.has(r.code) ? 'VN_HANOI' : (r.code || 'OTHER');
    if(!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  const GROUP_ORDER = ['TH_GOV','LA_GOV','VN_HANOI','YEEKEE','TH_STK'];
  const sorted = Object.entries(groups).sort(([a],[b]) => {
    const ia = GROUP_ORDER.indexOf(a), ib = GROUP_ORDER.indexOf(b);
    return (ia===-1?999:ia)-(ib===-1?999:ib);
  });
  const safeEsc = s => String(s||'').replace(/"/g,'&quot;');
  let html = '';

function agTogBet(el, key) {
  if (_buySelKeys.has(key)) {
    _buySelKeys.delete(key);
    el.classList.remove('on');
  } else {
    const newDigits = BET_CFG[key].digits;
    const toRemove = [];
    _buySelKeys.forEach(k => { if (BET_CFG[k].digits !== newDigits) toRemove.push(k); });
    toRemove.forEach(k => {
      _buySelKeys.delete(k);
      document.querySelector(`#agent-buy-modal .buy-type-btn[data-key="${k}"]`)?.classList.remove('on');
    });
    _buySelKeys.add(key);
    el.classList.add('on');
  }
  // Update number input hint
  const inp  = document.getElementById('ag-buy-num');
  const hint = document.getElementById('ag-buy-hint');
  if (!inp) return;
  if (_buySelKeys.size === 0) {
    inp.maxLength = 3; inp.placeholder = '—'; inp.style.display = '';
    if (hint) hint.textContent = 'เลือกประเภทก่อน';
    return;
  }
  const firstKey = [..._buySelKeys][0];
  const cfg = BET_CFG[firstKey];
  if (cfg.digits === 0) {
    inp.style.display = 'none';
    if (hint) hint.textContent = 'ไม่ต้องกรอกเลข — สร้างอัตโนมัติ';
  } else {
    inp.style.display = '';
    inp.maxLength = cfg.digits;
    inp.placeholder = 'X'.repeat(cfg.digits);
    if (hint) hint.textContent = `กรอก ${cfg.digits} หลัก`;
  }
}

function agExpandBets(num, key, amount) {
  const cfg = BET_CFG[key];
  const bets = [];
  switch (cfg.expand) {
    case 'single':
      bets.push({ number: num, bet_type: cfg.type, amount }); break;
    case 'rev3': {
      const d = num.split(''), perms = new Set();
      for (let i=0;i<3;i++) for (let j=0;j<3;j++) for (let k=0;k<3;k++)
        if (i!==j&&i!==k&&j!==k) perms.add(d[i]+d[j]+d[k]);
      for (const p of perms) bets.push({ number: p, bet_type: '3top', amount });
      break;
    }
    case 'rev2': {
      const rev = num.split('').reverse().join('');
      bets.push({ number: num, bet_type: '2top', amount });
      bets.push({ number: num, bet_type: '2bot', amount });
      if (rev !== num) {
        bets.push({ number: rev, bet_type: '2top', amount });
        bets.push({ number: rev, bet_type: '2bot', amount });
      }
      break;
    }
    case 'slideF':
      for (let i=0;i<10;i++) bets.push({ number: num+i, bet_type: cfg.type, amount }); break;
    case 'slideB':
      for (let i=0;i<10;i++) bets.push({ number: i+num, bet_type: cfg.type, amount }); break;
    case 'double':
      for (let i=0;i<10;i++) {
        const d = i.toString().repeat(2);
        bets.push({ number: d, bet_type: '2top', amount });
        bets.push({ number: d, bet_type: '2bot', amount });
      }
      break;
  }
  return bets;
}

function agAddToCart() {
  if (_buySelKeys.size === 0) { agBuyErr('กรุณาเลือกประเภทการแทงก่อน'); return; }
  const amt = parseFloat(document.getElementById('ag-buy-amt')?.value) || 0;
  if (amt < 1) { agBuyErr('จำนวนเงินต้องมากกว่า 0'); return; }
  const firstKey = [..._buySelKeys][0];
  const requiredDigits = BET_CFG[firstKey].digits;
  const num = document.getElementById('ag-buy-num')?.value.trim() || '';
  if (requiredDigits > 0) {
    if (!num) { agBuyErr('กรุณากรอกเลข'); return; }
    if (num.length !== requiredDigits) { agBuyErr(`ต้องกรอกเลข ${requiredDigits} หลัก`); return; }
  }
  _buySelKeys.forEach(key => {
    const cfg = BET_CFG[key];
    const inputNum  = cfg.digits === 0 ? '' : num;
    const expanded  = agExpandBets(inputNum, key, amt);
    const desc = cfg.digits === 0
      ? `${cfg.label} (${expanded.length} ใบ)`
      : `${cfg.label} [${inputNum}] (${expanded.length} ใบ)`;
    _buyCart.push({ key, desc, bets: expanded, amount: amt * expanded.length });
  });
  const numInp = document.getElementById('ag-buy-num');
  if (numInp) numInp.value = '';
  agBuyErr('');
  agRenderCart();
}

function agRenderCart() {
  const list = document.getElementById('ag-cart-list');
  const wrap = document.getElementById('ag-cart-wrap');
  if (!list || !wrap) return;
  if (_buyCart.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const BET_GRP = { '3top':'3 ตัว','3tod':'3 ตัว','2top':'บน','run_top':'บน','2bot':'ล่าง','run_bot':'ล่าง' };
  const buckets = { '3 ตัว':[], 'บน':[], 'ล่าง':[] };
  _buyCart.forEach((item, i) => {
    const sub = {};
    item.bets.forEach(bet => {
      const g = BET_GRP[bet.bet_type] || 'บน';
      if (!sub[g]) sub[g] = { nums:[], amt:0 };
      sub[g].nums.push(bet.number);
      sub[g].amt += bet.amount;
    });
    for (const [g, s] of Object.entries(sub)) {
      if (buckets[g]) buckets[g].push({ idx: i, nums: s.nums, amount: s.amt });
    }
  });
  let html = '';
  for (const grp of ['3 ตัว','บน','ล่าง']) {
    if (buckets[grp].length === 0) continue;
    html += `<div style="margin:6px 0 3px;font-size:12px;font-weight:700;color:var(--gold)">${grp}</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:6px">`;
    buckets[grp].forEach(e => {
      const numsHtml = e.nums.map(n =>
        `<span style="font-weight:700;letter-spacing:1px;background:rgba(255,255,255,.07);border-radius:5px;padding:1px 5px">${n}</span>`
      ).join(' ');
      html += `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;background:var(--card2);border:1px solid #444;border-radius:8px;padding:4px 8px;font-size:13px">
        <span style="display:flex;flex-wrap:wrap;gap:3px;flex:1">${numsHtml}</span>
        <span style="color:var(--gold);font-size:11px;white-space:nowrap;margin-left:4px">฿${e.amount.toLocaleString()}</span>
        <button onclick="agRemoveCart(${e.idx})" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:14px;padding:0 4px;line-height:1">✕</button>
      </div>`;
    });
    html += `</div>`;
  }
  list.innerHTML = html;
  const totalBets      = _buyCart.reduce((s,c) => s+c.bets.length, 0);
  const totalFaceAmt   = _buyCart.reduce((s,c) => s+c.amount, 0);
  const discountRate   = parseFloat(_agentData?.commission_rate || 0);
  const discountAmt    = parseFloat((totalFaceAmt * discountRate / 100).toFixed(2));
  const chargedAmt     = parseFloat((totalFaceAmt - discountAmt).toFixed(2));

  const tc  = document.getElementById('ag-cart-total');
  const tdc = document.getElementById('ag-cart-discount');
  const tch = document.getElementById('ag-cart-charged');
  const bc  = document.getElementById('ag-buy-count');
  if (tc)  tc.textContent  = '฿' + totalFaceAmt.toLocaleString();
  if (tdc) tdc.textContent = '-฿' + discountAmt.toLocaleString();
  if (tch) tch.textContent = '฿' + chargedAmt.toLocaleString();
  if (bc)  bc.textContent  = totalBets;
}

function agRemoveCart(idx) {
  _buyCart.splice(idx, 1);
  agRenderCart();
}

function agBuyErr(msg) {
  const el = document.getElementById('ag-buy-err');
  if (el) { el.textContent = msg; el.style.color = msg ? 'var(--red)' : ''; }
}

async function agDoBuy() {
  if (_buyCart.length === 0) { agBuyErr('กรุณาเพิ่มรายการก่อน'); return; }
  if (!_buyRound) { agBuyErr('ไม่พบรอบหวย'); return; }
  const allBets = _buyCart.flatMap(c => c.bets);
  const btn = document.getElementById('ag-confirm-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ กำลังส่ง...'; }
  agBuyErr('');
  try {
    const d = await aFetch('/agent/lottery/bets-batch', {
      method: 'POST',
      body: JSON.stringify({ round_id: _buyRound.id, bets: allBets })
    });
    if (d.data?.balance !== undefined) _agentData.balance = d.data.balance;
    document.getElementById('agent-buy-modal')?.remove();
    // Toast
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:30px;right:20px;background:#1a2a1a;border:1px solid var(--green);border-radius:12px;padding:14px 20px;color:var(--green);font-weight:700;font-size:14px;z-index:9999';
    toast.textContent = '✅ ' + d.message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
    loadLottery('buy');
  } catch(e) {
    agBuyErr(e.message);
    if (btn) { btn.disabled = false; btn.textContent = `✅ ยืนยันการแทง ${_buyCart.flatMap(c=>c.bets).length} ใบ`; }
  }
}

async function loadLottery(subTab = 'buy') {
  _lotterySubTab = subTab;
  const el = document.getElementById('tab-content');
  el.innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:0">
      <div class="nav-tab ${subTab==='buy'?'on':''}" style="padding:10px 16px;font-size:12px" onclick="loadLottery('buy')">🎯 แทงหวย</div>
      <div class="nav-tab ${subTab==='history'?'on':''}" style="padding:10px 16px;font-size:12px" onclick="loadLottery('history')">📋 ประวัติการแทง</div>
    </div>
    <div id="lottery-sub"></div>`;

  if (subTab === 'buy') loadLotteryBuy();
  else                  loadLotteryHistory();
}

async function loadLotteryBuy() {
  const el = document.getElementById('lottery-sub');
  if (!el) return;
  try {
    const data   = await aFetch('/agent/lottery/rounds');
    const rounds = data.data || [];
    if (rounds.length === 0) {
      el.innerHTML = '<div class="empty">⏳ ยังไม่มีงวดที่เปิดรับแทง</div>';
      return;
    }
    _allAgentRounds = rounds;

    // Build filter tabs
    const rawCodes = [...new Set(rounds.map(r => r.code).filter(Boolean))];
    const mergedCodes = [...new Set(rawCodes.map(c => VN_CODES.has(c) ? 'VN_HANOI' : c))];
    const TAB_ORDER = ['TH_GOV','LA_GOV','VN_HANOI','YEEKEE','TH_STK'];
    mergedCodes.sort((a,b)=>{
      const ia=TAB_ORDER.indexOf(a), ib=TAB_ORDER.indexOf(b);
      return (ia===-1?999:ia)-(ib===-1?999:ib);
    });
    const extraTabs = mergedCodes.map(code => {
      const meta = LOT_TYPE_META[code] || { flag:'🎰', label:code };
      return `<button class="lot-ftab" data-code="${code}" onclick="_agentFilterLot(this,'${code}')">${meta.flag} ${meta.label}</button>`;
    }).join('');

    el.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:12px;color:var(--muted)">เลือกงวดที่ต้องการแทง</div>
        <div style="font-size:12px;color:var(--gold2);font-weight:700">💰 ฿${fmt(_agentData?.balance||0)}</div>
      </div>
      <div class="lot-filter">
        <button class="lot-ftab on" data-code="ALL" onclick="_agentFilterLot(this,'ALL')">🎰 ทั้งหมด</button>
        ${extraTabs}
      </div>
      <div id="agent-lot-groups"></div>`;

    _agentLotFilter = 'ALL';
    _renderAgentLotGroups('ALL');
  } catch(e) { el.innerHTML = `<div class="empty">❌ ${e.message}</div>`; }
}

async function loadLotteryHistory(page = 1) {
  const el = document.getElementById('lottery-sub');
  if (!el) return;
  try {
    const data  = await aFetch(`/agent/lottery/bets?page=${page}&limit=20`);
    const rows  = data.data  || [];
    const total = data.total || 0;
    const stats = data.stats || {};
    const pages = Math.ceil(total / 20);
    el.innerHTML = `
      <div class="stat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
        <div class="stat-card"><div class="stat-label">ยอดแทงรวม</div><div class="stat-val" style="font-size:18px">฿${fmt(stats.total_bet)}</div></div>
        <div class="stat-card"><div class="stat-label">รางวัลรวม</div><div class="stat-val green" style="font-size:18px">฿${fmt(stats.total_win)}</div></div>
        <div class="stat-card"><div class="stat-label">ถูกรางวัล</div><div class="stat-val gold" style="font-size:18px">${stats.wins||0} ครั้ง</div></div>
        <div class="stat-card"><div class="stat-label">รอผล</div><div class="stat-val" style="font-size:18px">${stats.pending||0} รายการ</div></div>
      </div>
      <div class="card" style="padding:0">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>#</th><th>งวด</th><th>ประเภท</th><th>เลข</th><th>ยอด</th><th>รางวัล</th><th>สถานะ</th><th>วันที่</th></tr></thead>
            <tbody>
              ${rows.length === 0 ? '<tr><td colspan="8" class="empty">ยังไม่มีประวัติการแทง</td></tr>' :
              rows.map(b => `<tr>
                <td style="color:var(--muted);font-size:11px">${b.id}</td>
                <td style="font-size:12px"><div>${b.flag||''} ${b.lottery_name}</div><div style="color:var(--muted);font-size:10px">${b.round_name}</div></td>
                <td style="font-size:12px;font-weight:700">${BET_LABEL[b.bet_type]||b.bet_type}</td>
                <td style="font-size:18px;font-weight:900;color:var(--gold2);letter-spacing:2px">${b.number}</td>
                <td style="font-weight:700">฿${fmt(b.amount)}</td>
                <td style="color:var(--green);font-weight:700">${b.win_amount > 0 ? '฿'+fmt(b.win_amount) : '—'}</td>
                <td><span class="badge ${b.status==='win'?'badge-win':b.status==='waiting'?'badge-wait':'badge-lose'}">${BET_STATUS[b.status]||b.status}</span></td>
                <td style="font-size:11px;color:var(--muted)">${new Date(b.created_at).toLocaleDateString('th-TH',{day:'2-digit',month:'short'})}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="paging">${Array.from({length:pages},(_,i)=>`<button class="page-btn ${i+1===page?'on':''}" onclick="loadLotteryHistory(${i+1})">${i+1}</button>`).join('')}</div>`;
  } catch(e) { el.innerHTML = `<div class="empty">❌ ${e.message}</div>`; }
}

// ── Util ──────────────────────────────────────────────────────────
function fmt(n) { return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── Commission Transfer Modal (Agent) ─────────────────────────────
function openAgCommTransfer(){
  let modal = document.getElementById('ag-comm-transfer-modal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'ag-comm-transfer-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:3000;display:flex;align-items:center;justify-content:center;padding:16px';
    modal.innerHTML = `
      <div style="background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:360px;border:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 style="margin:0;font-size:16px;color:var(--text)">💸 โอนค่าคอมเข้ากระเป๋าหลัก</h3>
          <button onclick="document.getElementById('ag-comm-transfer-modal').remove()"
            style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1">×</button>
        </div>
        <div style="background:var(--card2);border-radius:10px;padding:12px;margin-bottom:16px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">ยอดค่าคอมที่มี</div>
          <div style="font-size:24px;font-weight:900;color:var(--gold)" id="ag-ct-available">฿0.00</div>
        </div>
        <div style="margin-bottom:16px">
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">จำนวนที่ต้องการโอน (บาท)</label>
          <div style="display:flex;gap:8px">
            <input id="ag-ct-amount" type="number" min="1" step="0.01" placeholder="ระบุจำนวน"
              style="flex:1;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Sarabun',sans-serif">
            <button onclick="document.getElementById('ag-ct-amount').value=document.getElementById('ag-ct-available').dataset.raw||0"
              style="padding:10px 14px;background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.4);border-radius:8px;color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;white-space:nowrap">ทั้งหมด</button>
          </div>
        </div>
        <button onclick="doAgCommTransfer()"
          style="width:100%;padding:12px;background:var(--gold);border:none;border-radius:10px;color:#000;font-weight:800;font-size:15px;cursor:pointer;font-family:'Sarabun',sans-serif">
          ✅ ยืนยันโอน
        </button>
        <div id="ag-ct-msg" style="margin-top:10px;text-align:center;font-size:13px;min-height:20px"></div>
      </div>`;
    modal.addEventListener('click', e => { if(e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
  }
  const commBal = parseFloat(_agentData?.commission_balance || 0);
  const avEl = document.getElementById('ag-ct-available');
  if(avEl){ avEl.textContent = '฿' + fmt(commBal); avEl.dataset.raw = commBal; }
  document.getElementById('ag-comm-transfer-modal').style.display = 'flex';
}

async function doAgCommTransfer(){
  const amount = parseFloat(document.getElementById('ag-ct-amount')?.value);
  const msgEl  = document.getElementById('ag-ct-msg');
  if(!amount || amount <= 0){ if(msgEl) msgEl.innerHTML = '<span style="color:var(--red)">ระบุจำนวนเงิน</span>'; return; }
  if(msgEl) msgEl.innerHTML = '⏳ กำลังโอน...';
  try{
    const d = await aFetch('/agent/commission/transfer', { method:'POST', body: JSON.stringify({ amount }) });
    if(!d.success) throw new Error(d.message);
    if(msgEl) msgEl.innerHTML = `<span style="color:var(--green)">✅ ${d.message}</span>`;
    if(_agentData) _agentData.commission_balance = Math.max(0, parseFloat(_agentData.commission_balance||0) - amount);
    setTimeout(()=>{
      document.getElementById('ag-comm-transfer-modal')?.remove();
      loadTab(document.querySelector('.tab-item.active')?.dataset?.tab || 'dashboard');
    }, 1200);
  }catch(e){
    if(msgEl) msgEl.innerHTML = `<span style="color:var(--red)">❌ ${e.message}</span>`;
  }
}

// ── Auto-login if token exists ────────────────────────────────────
(async () => {
  if (_agentToken) {
    try { await showApp(); }
    catch(_) { localStorage.removeItem('agent_token'); }
  }
})();
</script>
