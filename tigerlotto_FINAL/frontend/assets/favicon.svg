<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#d4a017"/>
  <!-- Tiger face -->
  <!-- Head -->
  <ellipse cx="32" cy="33" rx="18" ry="16" fill="#f5a623"/>
  <!-- Ears -->
  <polygon points="16,20 10,8 22,16" fill="#f5a623"/>
  <polygon points="48,20 54,8 42,16" fill="#f5a623"/>
  <!-- Inner ears -->
  <polygon points="16,19 12,11 20,16" fill="#e8846a"/>
  <polygon points="48,19 52,11 44,16" fill="#e8846a"/>
  <!-- White face patches -->
  <ellipse cx="25" cy="37" rx="7" ry="6" fill="#fff8e7"/>
  <ellipse cx="39" cy="37" rx="7" ry="6" fill="#fff8e7"/>
  <!-- Eyes -->
  <ellipse cx="26" cy="30" rx="4" ry="4.5" fill="#2c1810"/>
  <ellipse cx="38" cy="30" rx="4" ry="4.5" fill="#2c1810"/>
  <!-- Eye shine -->
  <circle cx="27.5" cy="28.5" r="1.5" fill="white"/>
  <circle cx="39.5" cy="28.5" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="36" rx="3" ry="2" fill="#e8846a"/>
  <!-- Mouth -->
  <path d="M29 38 Q32 41 35 38" stroke="#2c1810" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Whisker dots -->
  <circle cx="22" cy="37" r="1" fill="#c8892a"/>
  <circle cx="22" cy="40" r="1" fill="#c8892a"/>
  <circle cx="42" cy="37" r="1" fill="#c8892a"/>
  <circle cx="42" cy="40" r="1" fill="#c8892a"/>
  <!-- Stripes on forehead -->
  <path d="M29 22 Q32 19 35 22" stroke="#c8892a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M27 25 L29 22" stroke="#c8892a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M37 25 L35 22" stroke="#c8892a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
